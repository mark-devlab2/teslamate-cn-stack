name: Release To Aliyun

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_publish:
    uses: mark-devlab2/aliyun-deploy-platform/.github/workflows/build-publish.yml@main
    with:
      build_config_path: .deploy/build.yaml
      platform_repo: mark-devlab2/aliyun-deploy-platform
      platform_ref: main
    secrets: inherit

  deploy:
    needs: build_publish
    uses: mark-devlab2/aliyun-deploy-platform/.github/workflows/deploy-service.yml@main
    with:
      service_id: ${{ needs.build_publish.outputs.service_id }}
      image_tag: ${{ needs.build_publish.outputs.image_tag }}
      target: ${{ needs.build_publish.outputs.deploy_target }}
      platform_repo: mark-devlab2/aliyun-deploy-platform
      platform_ref: main
    secrets: inherit

